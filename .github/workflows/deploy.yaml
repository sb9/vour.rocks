name: Build and Deploy vour.rocks

# Pipeline startet, sobald auf den master-Branch gepusht wird
on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Code aus dem GitHub-Repository auschecken
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Python auf dem Server bereitstellen (Cactus benötigt Python)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.6.8' # Falls Cactus eine andere Version braucht, hier anpassen

    # 3. Cactus und Abhängigkeiten installieren
    - name: Install Cactus
      run: |
        python -m pip install --upgrade pip
        pip install cactus
        # Falls du eine requirements.txt hast, aktiviere die nächste Zeile:
        # pip install -r requirements.txt

    # 4. Die statische Seite mit Cactus generieren
    - name: Build Website
      run: |
        cactus build

    # 5. Die generierten Dateien per SFTP auf den Webhost hochladen
    - name: SFTP Deploy to Webhost
      uses: lbgm/sftp-deploy-action@v1.2.2
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        # Lokaler Ordner, den Cactus erstellt hat (Standard ist meist 'build')
        local_dir: './build' 
        # Zielordner auf deinem Webspace
        remote_dir: ${{ secrets.SFTP_REMOTE_DIR }}
        # Verhindert, dass die Pipeline fehlschlägt, falls der Server ein unbekanntes SSL-Zertifikat meldet
        unsafe: true