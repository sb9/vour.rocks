name: Build and Deploy Cactus Site

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    # Zurück auf das aktuelle, schnelle Ubuntu!
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Wir installieren ein stabiles, modernes Python, auf dem neuere Server sofort anspringen
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Wir installieren Cactus. Falls es meckert, nutzen wir den --break-system-packages oder pipx Weg.
    - name: Install Cactus
      run: |
        python -m pip install --upgrade pip
        pip install cactus

    - name: Build Website
      run: |
        cactus build

    - name: SFTP Deploy to Webhost
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        local-dir: ./build/
        server-dir: ${{ secrets.SFTP_REMOTE_DIR }}
        protocol: sftp
        port: 22