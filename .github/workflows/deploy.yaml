name: Build and Deploy Cactus Site

on:
  push:
    branches:
      - master

# Hier beheben wir die Node 20 Warnung global für die ganze Pipeline
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    # Wichtig: Wir wechseln auf Ubuntu 20.04, damit Python 3.6.8 installiert werden kann
    runs-on: ubuntu-20.04

    steps:
    # 1. Code auschecken
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Altes Python 3.6.8 bereitstellen
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.6.8'

    # 3. Cactus installieren
    - name: Install Cactus
      run: |
        python -m pip install --upgrade pip
        pip install cactus

    # 4. Die statische Seite mit Cactus generieren
    - name: Build Website
      run: |
        cactus build

    # 5. Die generierten Dateien per SFTP auf den Webhost hochladen
    - name: SFTP Deploy to Webhost
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        local-dir: ./build/
        server-dir: ${{ secrets.SFTP_REMOTE_DIR }}
        protocol: sftp
        port: 22