name: Build and Deploy Cactus Site

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Cactus
      run: |
        python -m pip install --upgrade pip
        pip install cactus

    - name: Build Website
      run: |
        cactus build

    # DIESER SCHRITT HILFT UNS BEIM SUCHEN: Er listet alle Ordner nach dem Build auf
    - name: List files after build
      run: ls -la

    # Wir nutzen hier eine reine SFTP-Action (ohne FTP-Verwirrung)
    - name: SFTP Deploy to Webhost
      uses: wlixcc/SFTP-Deploy-Action@v1.2.4
      with:
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        server: ${{ secrets.SFTP_SERVER }}
        port: 22
        # Falls der Ordner anders heißt, passen wir das nach dem nächsten Run an:
        local_path: './.build/*'
        remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
        # Verhindert Fehler bei unbekannten SSH-Schlüsseln des Hoster-Servers
        sftp_only: true
