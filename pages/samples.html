{% extends "base.html" %}

{% block body %}
<!-- Samples Section -->
<section id="samples" class="container content-section text-center">
    <div class="row animsition">
        <h2>Media</h2>
        <div class="col-lg-6 col-lg-offset-3">
            <h4>Songs</h4>
            <table class='table text-left'>
                <tbody>
                    <tr>
                        <td>
                            <a href="{% static 'download/alright.mp3' %}">Alright</a>
                        </td>
                        <td>
                            <audio src="{% static 'download/alright.mp3' %}" preload='none' controls></audio>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <a href="{% static 'download/power.mp3' %}">Power</a>
                        </td>
                        <td>
                            <audio src="{% static 'download/power.mp3' %}" preload='none' controls></audio>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <a href="{% static 'download/i_got_you.mp3' %}">I got you</a>
                        </td>
                        <td>
                            <audio src="{% static 'download/i_got_you.mp3' %}" preload='none' controls></audio>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <a href="{% static 'download/vour.mp3' %}">Vour</a>
                        </td>
                        <td>
                            <audio src="{% static 'download/vour.mp3' %}" preload='none' controls></audio>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <a href="{% static 'download/nothing.mp3' %}">Nothing</a>
                        </td>
                        <td>
                            <audio src="{% static 'download/nothing.mp3' %}" preload='none' controls></audio>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div>
                <h5>Aktuelle CD erhältlich bei <a target='_blank' href='https://vour-rock.bandcamp.com/releases'>Bandcamp</a></h5>
            </div>
            <div>
                <h4>Videos</h4>
                <h5>I got you (Director's Cut)</h5>
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/8j221a5MGnI" frameborder="0" allowfullscreen></iframe>
                <div>Video produced by <a target='_blank' href='http://samplay.de'>SamPlay</a></div>
                <p></p>
                <h5>Live at Backstage 2016</h5>
                <iframe width="100%" height="315" src="https://www.youtube.com/embed/QoZu304-jo4" frameborder="0" allowfullscreen></iframe>
                <div>Special Thanks to <a target='_blank' href='https://www.youtube.com/channel/UCMCsjeBsu5Y-Xmc4P-fOPlQ/featured'>Michael Muster</a></div>
                <p></p>
            </div>
        </div>
    </div>
    <div class='row'>
        <h4>On Stage</h4>
        <img class='img-responsive' src='https://farm5.staticflickr.com/4337/36314080051_b249c9a91a_o.jpg'>
        <img class='img-responsive' src='https://farm5.staticflickr.com/4395/36405464486_b2dd4c9830_o.jpg'>
    </div>
</section>

{% endblock %}
